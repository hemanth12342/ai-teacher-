<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher — Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 500;
            transition: color 0.2s, border-bottom 0.2s;
        }
        .tab.active {
            color: #fff;
            border-bottom: 2px solid #6366f1;
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: #6366f1;
            cursor: pointer;
            margin-top: -10px;
            margin-bottom: 16px;
            text-decoration: underline;
        }
    </style>
    <script src="/js/config.js"></script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="auth-container">
        <div class="auth-title">AI Teacher Platform</div>
        
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <div id="form-login" class="form-section active">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="login-username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="login-password" placeholder="Enter your password">
            </div>
            
            <a class="forgot-link" onclick="switchTab('reset')">Forgot Password?</a>

            <div class="form-error" id="login-error"></div>
            <button class="btn btn-primary" style="width: 100%" onclick="doLogin()" id="btn-login">Login</button>
        </div>

        <!-- Reset Password Form -->
        <div id="form-reset" class="form-section">
            <div style="margin-bottom: 16px; color: #94a3b8; font-size: 0.9rem;">
                Enter your username and a new password to reset it.
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="reset-username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="reset-password" placeholder="Enter new password">
            </div>

            <a class="forgot-link" onclick="switchTab('login')">Cancel</a>

            <div class="form-error" id="reset-error"></div>
            <button class="btn btn-primary" style="width: 100%" onclick="doResetPassword()" id="btn-reset">Reset Password</button>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="form-section">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="reg-username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="reg-email" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="reg-password" placeholder="Choose a password">
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <select class="form-input form-select" id="reg-role">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="form-error" id="reg-error"></div>
            <button class="btn btn-primary" style="width: 100%" onclick="doRegister()" id="btn-register">Create Account</button>
        </div>



    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'login' || tab === 'register') {
                document.getElementById(`tab-${tab}`).classList.add('active');
            }
            document.getElementById(`form-${tab}`).classList.add('active');
        }
        
        async function doResetPassword() {
            const username = document.getElementById('reset-username').value.trim();
            const newPassword = document.getElementById('reset-password').value;
            const err = document.getElementById('reset-error');
            const btn = document.getElementById('btn-reset');

            if (!username || !newPassword) { err.textContent = "Please fill all fields"; err.classList.add('show'); return; }
            
            btn.textContent = "Resetting...";
            btn.disabled = true;
            err.classList.remove('show');

            try {
                const res = await fetch(window.API_BASE_URL + '/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, new_password: newPassword})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Failed to reset password");
                }
                alert("Password successfully reset! You can now log in.");
                switchTab('login');
            } catch (e) {
                err.textContent = e.message;
                err.classList.add('show');
            } finally {
                btn.textContent = "Reset Password";
                btn.disabled = false;
            }
        }

        async function doLogin() {
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value;
            const err = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');

            if (!u || !p) { err.textContent = "Please fill all fields"; err.classList.add('show'); return; }
            
            btn.textContent = "Logging in...";
            btn.disabled = true;
            err.classList.remove('show');

            try {
                const res = await fetch(window.API_BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Login failed");
                }
                const data = await res.json();
                localStorage.setItem("global_token", data.token);
                localStorage.setItem("global_username", data.username);
                localStorage.setItem("global_role", data.role);
                window.location.href = "index.html";
            } catch (e) {
                err.textContent = e.message;
                err.classList.add('show');
                btn.textContent = "Login";
                btn.disabled = false;
            }
        }

        async function doRegister() {
            const u = document.getElementById('reg-username').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-password').value;
            const r = document.getElementById('reg-role').value;
            const err = document.getElementById('reg-error');
            const btn = document.getElementById('btn-register');

            if (!u || !p || !e) { err.textContent = "Please fill all fields"; err.classList.add('show'); return; }
            
            btn.textContent = "Creating...";
            btn.disabled = true;
            err.classList.remove('show');

            try {
                const res = await fetch(window.API_BASE_URL + '/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, email: e, password: p, role: r})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Registration failed");
                }
                const data = await res.json();
                localStorage.setItem("global_token", data.token);
                localStorage.setItem("global_username", data.username);
                localStorage.setItem("global_role", data.role);
                window.location.href = "index.html";
            } catch (ex) {
                err.textContent = ex.message;
                err.classList.add('show');
                btn.textContent = "Create Account";
                btn.disabled = false;
            }
        }


    </script>
</body>
</html>
